<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinma App - Hackathon Prototype</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #021a2b; --bg-card: #0b2d42; --accent: #ffa08a; --text-main: #ffffff; --text-muted: #8da1ae; --border-color: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #e0e5ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .phone-container { width: 375px; height: 812px; background-color: var(--bg-main); border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; border: 8px solid #111; position: relative; display: flex; flex-direction: column; color: var(--text-main); }
        .status-bar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; font-size: 12px; font-weight: 600; }
        .app-header { padding: 10px 20px 20px 20px; display: flex; align-items: center; justify-content: space-between; }
        .app-header .back-btn { font-size: 20px; cursor: pointer; color: var(--text-main); }
        .app-header .title { font-size: 18px; font-weight: 700; }
        .screen-content { flex: 1; overflow-y: auto; padding: 0 20px 90px 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 8px; color: var(--text-muted); }
        .form-control { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 14px; border-radius: 12px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--accent); }
        .btn-primary { background-color: var(--accent); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; background-color: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="status-bar"><span>9:41</span><span>5G 🔋</span></div>
        <div class="app-header">
            <span class="back-btn" onclick="window.location.href='index.html'"><i class="ph ph-caret-right"></i></span>
            <span class="title">إنشاء صندوق عائلي</span>
            <span style="width: 20px;"></span>
        </div>
        <div class="screen-content">
            <div class="form-group">
                <label>اسم الصندوق العائلي</label>
                <input type="text" id="fundName" class="form-control" placeholder="مثال: صندوق عائلة المحمد">
            </div>
            <div class="form-group">
                <label>مبلغ الاستقطاع الشهري الموحد (ريال)</label>
                <input type="number" id="deductionAmount" class="form-control" placeholder="مثال: 200">
            </div>
            <div class="form-group">
                <label>أعضاء الصندوق (المشاركين)</label>
                <div id="membersList"></div>
                <button class="btn-primary" onclick="addMemberPrompt()" style="background-color: var(--bg-card); color: var(--accent); border: 1px dashed var(--accent);">
                    <i class="ph ph-plus" style="margin-left: 8px;"></i> إضافة عضو جديد
                </button>
                <p style="font-size: 10px; color: var(--text-muted); margin-top: 8px;">إذا لم تُضف أعضاء، سيتم استخدام أعضاء تجريبيين للعرض.</p>
            </div>
            <div class="form-group" style="margin-top: 40px;">
                <button class="btn-primary" onclick="confirmCreateFund()">تأكيد وإنشاء الصندوق</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', renderDraftMembers);</script>
</body>
</html>
