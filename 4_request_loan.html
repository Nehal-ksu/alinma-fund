<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinma App - Hackathon Prototype</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #021a2b;
            --bg-card: #0b2d42;
            --bg-card-hover: #123e59;
            --accent: #ffa08a;
            --text-main: #ffffff;
            --text-muted: #8da1ae;
            --border-color: rgba(255, 255, 255, 0.05);
            --success: #4caf50;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #e0e5ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .phone-container { width: 375px; height: 812px; background-color: var(--bg-main); border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); overflow: hidden; border: 8px solid #111; position: relative; display: flex; flex-direction: column; color: var(--text-main); }
        .status-bar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; font-size: 12px; font-weight: 600; }
        .app-header { padding: 10px 20px 20px 20px; display: flex; align-items: center; justify-content: space-between; }
        .app-header .back-btn { font-size: 20px; cursor: pointer; color: var(--text-main); }
        .app-header .title { font-size: 18px; font-weight: 700; }
        .screen-content { flex: 1; overflow-y: auto; padding: 0 20px 90px 20px; }
        .screen-content::-webkit-scrollbar { width: 0; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 8px; color: var(--text-muted); }
        .form-control { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 14px; border-radius: 12px; font-size: 14px; outline: none; }
        .form-control:focus { border-color: var(--accent); }
        select.form-control { appearance: none; }
        .btn-primary { background-color: var(--accent); color: #000; width: 100%; padding: 15px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="status-bar"><span>9:41</span><span>5G 🔋</span></div>
        <div class="app-header">
            <span class="back-btn" onclick="window.location.href='3_fund_dashboard.html'"><i class="ph ph-caret-right"></i></span>
            <span class="title">طلب تمويل من الصندوق</span>
            <span style="width: 20px;"></span>
        </div>
        <div class="screen-content">

            <div class="form-group">
                <label>مبلغ التمويل المطلوب (ر.س)</label>
                <input type="number" id="loanAmount" class="form-control" placeholder="0.00">
            </div>

            <div class="form-group">
                <label>مدة السداد المقترحة (بالأشهر)</label>
                <input type="number" id="loanMonths" class="form-control" placeholder="مثال: 12">
            </div>

            <div class="form-group">
                <label>سبب طلب التمويل</label>
                <select class="form-control" id="reasonSelect" onchange="checkReason()">
                    <option value="" disabled selected>اختر السبب...</option>
                    <option value="زواج">زواج</option>
                    <option value="شراء سياره">شراء سياره</option>
                    <option value="شراء عقار">شراء عقار</option>
                    <option value="تعسر ديون">تعسر ديون</option>
                    <option value="اخرى">اخرى</option>
                </select>
                <i class="ph ph-caret-down" style="position: absolute; left: 55px; margin-top: -33px; color: var(--text-muted); pointer-events: none;"></i>
            </div>

            <div class="form-group" id="otherReasonDiv" style="display: none;">
                <label>يرجى توضيح السبب (سيظهر للأعضاء)</label>
                <textarea class="form-control" id="otherReasonText" rows="3" placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
            </div>

            <div class="form-group">
                <label>المرفقات والإثباتات (اختياري)</label>
                <div style="background-color: var(--bg-card); border: 1px dashed var(--border-color); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer;">
                    <i class="ph ph-upload-simple" style="font-size: 24px; color: var(--accent); margin-bottom: 10px;"></i>
                    <p style="font-size: 12px; color: var(--text-muted);">اضغط هنا لرفع المستندات (PDF, JPG)</p>
                </div>
            </div>

            <div class="form-group" style="margin-top: 30px;">
                <button class="btn-primary" onclick="submitLoanForm()">إرسال الطلب</button>
            </div>

        </div>
    </div>
    <script src="app.js"></script>
    <script>
        function checkReason() {
            var select = document.getElementById("reasonSelect");
            var otherDiv = document.getElementById("otherReasonDiv");
            otherDiv.style.display = (select.value === "اخرى") ? "block" : "none";
        }
    </script>
</body>
</html>
